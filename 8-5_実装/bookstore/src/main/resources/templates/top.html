<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>トップ画面</title>
</head>

<body>
    <h1>書籍一覧</h1>
    <a>
        <strong>検索</strong>
    </a>
    <form th:action="@{/books}" th:object="${bookForm}" method="get">
        <div>
            <label for="title">タイトル：</label>
            <input type="text" name="title" id="title">
        </div>
        <div>
            <button type="submit">検索</button>
            <button type="button" onclick="location.href='/books/top'">クリア</button>
        </div>
    </form>

    <table border="1" `>
        <thead>
            <tr>
                <th>ID</th>
                <th>書籍名</th>
                <th>価格</th>
                <th>カテゴリ</th>
                <th>在庫数</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.price}"></td>
                <td>
                    <span th:text="${book.category}"></span>
                </td>
                <td th:text="${book.stock}"></td>
                <td>
                    <form th:if="${role == '会員'}" th:action="@{/books/purchase/{id}(id=${book.id})}">
                        <button type="submit">購入</button>
                    </form>

                    <form th:if="${role == '在庫管理者'|| role == 'システム管理者'}" th:action="@{/books/edit/{id}(id=${book.id})}">
                        <button type="submit">編集</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <p th:if="${books.size() == 0}">該当する本は見つかりませんでした。</p>
    <form th:action="@{/users/mypage}" method="get">
        <button type="submit">マイページへ</button>
    </form>
    <form th:action="@{/}" method="get">
        <button type="submit">ログアウト</button>
    </form>
    <a th:href="@{/menu}">メニューへ</a>
</body>

</html>
