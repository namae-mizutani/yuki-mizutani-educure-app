spring.application.name=webapp
# PostgreSQL接続設定
spring.datasource.url=jdbc:postgresql://localhost:5432/bookstore_db
spring.datasource.username=postgres
spring.datasource.password=CYV94XpcfV
spring.datasource.driver-class-name=org.postgresql.Driver

# SQLの自動実行設定
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# MyBatis設定
mybatis.type-aliases-package=jp.mizutani.bookstore.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.mapper-locations=classpath*:/mapper/*.xml
# ログ設定
logging.level.jp.mizutani.bookstore.repository=DEBUG